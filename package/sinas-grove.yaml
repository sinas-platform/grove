apiVersion: sinas.co/v1
kind: SinasPackage
metadata:
  name: sinas-grove
  description: >
    Multi-agent document indexing and retrieval. Installs the Grove connector,
    document ingestion collection, post-upload function, and the 13 Grove
    agents (ingestion, retrieval, synthesis).

package:
  name: sinas-grove
  version: "0.1.13"
  description: >
    Sinas Grove — stateful, multi-agent document indexing and retrieval. The
    runtime is generic; domain knowledge (document classes, properties,
    entity/relationship types, dossiers, playbooks) is configured in the Grove
    backend and discovered by agents at runtime via the connector.
  author: Sinas Grove contributors
  url: https://github.com/sinas-platform/sinas-grove

spec:
  # ─────────────────────────────────────────────
  # Function-runtime Python dependencies — installed by Sinas on worker
  # rebuild. The post-upload function uses MarkItDown to convert arbitrary
  # uploads (docx, pdf, html, xlsx, pptx, …) to markdown.
  # ─────────────────────────────────────────────
  dependencies:
    # `[all]` extra pulls in pdfminer, python-docx, openpyxl, python-pptx,
    # mammoth, etc. — needed for the converters to handle PDF/Office formats.
    - packageName: markitdown[all]
      version: ">=0.0.1a3"

  # ─────────────────────────────────────────────
  # Install-time variables — prompted for by the package installer
  # ─────────────────────────────────────────────
  variables:
    - name: GROVE_URL
      type: text
      description: >
        Base URL where Grove's HTTP API is reachable from inside the Sinas
        containers. For local docker-compose this is http://host.docker.internal:8080.
        For deployed environments, the public/internal URL of the Grove service.
      example: https://grove.example.com
      required: true

    - name: PRIMARY_LLM
      type: resource_ref
      resource: llm_providers
      description: >
        LLM provider used by the capable / mid-tier agents — orchestration,
        deep search, relationship discovery, synthesis, and faithfulness
        validation. Should point at a provider configured for a strong reasoning
        model (e.g. Claude Sonnet).
      required: true

    - name: CHEAP_LLM
      type: resource_ref
      resource: llm_providers
      description: >
        LLM provider used by the cost-tiered ingestion enrichers — classifier,
        summarizer, property extractor, entity extractor, relationship extractor,
        dossier assigner, and process validation. Should point at a provider
        configured for a fast / cheap model (e.g. Claude Haiku).
      required: true

  # ─────────────────────────────────────────────
  # Collection — uploads here trigger ingestion
  # ─────────────────────────────────────────────
  collections:
    - namespace: grove
      name: documents
      description: Documents indexed by Grove. Upload here to trigger ingestion.
      metadataSchema:
        type: object
        properties:
          source:
            type: string
            description: Where the document came from (manual, api, batch, s3, sftp)
          dossier_id:
            type: string
            description: Optional — assign on upload to a known dossier
          dossier_path_hint:
            type: string
            description: Optional — string the dossier_assigner_agent can use
        additionalProperties: true
      maxFileSizeMb: 50
      maxTotalSizeGb: 50
      postUploadFunction: grove/post_upload

  # ─────────────────────────────────────────────
  # Connector — wraps the Grove HTTP API
  # ─────────────────────────────────────────────
  connectors:
    - namespace: grove
      name: api
      description: >
        HTTP API of the Sinas Grove backend. Agents call these operations to
        introspect the domain model, read document content, and write
        ingestion / retrieval / synthesis artifacts.
      baseUrl: ${{ vars.GROVE_URL }}
      # `sinas_token` forwards the calling user's Sinas token. Grove validates
      # it via Sinas's /auth/me endpoint to resolve the user's identity and
      # roles for owner/roles enforcement. No shared API key is needed.
      auth:
        type: sinas_token
      operations:
        # ── configuration introspection ──
        - name: get_document_classes
          method: GET
          path: /api/v1/config/document-classes
          description: List all document classes with descriptions and classification hints.

        - name: get_document_class_properties
          method: GET
          path: /api/v1/config/document-classes/{{ class_id }}/properties
          parameters:
            type: object
            properties:
              class_id: { type: string, format: uuid }
            required: [class_id]
          description: Get the property schema for a document class.

        - name: get_entity_types_for_class
          method: GET
          path: /api/v1/config/document-classes/{{ class_id }}/entity-types
          parameters:
            type: object
            properties:
              class_id: { type: string, format: uuid }
            required: [class_id]
          description: Entity types attached to a document class.

        - name: get_entity_types
          method: GET
          path: /api/v1/config/entity-types
          description: All entity types in the deployment.

        - name: get_relationship_definitions
          method: GET
          path: /api/v1/config/relationship-definitions
          description: All relationship definitions.

        # ── playbooks (Grove-owned) ──
        - name: list_applicable_playbooks
          method: GET
          path: /api/v1/playbooks/{{ kind }}/applicable/list
          parameters:
            type: object
            properties:
              kind: { type: string, enum: [retrieval, synthesis] }
              document_class_id: { type: string, format: uuid }
              dossier_class_id: { type: string, format: uuid }
            required: [kind]
          description: |
            List playbooks of `kind` applicable to the given scope. A playbook
            with no scope rows applies everywhere; a playbook with scope rows
            applies when at least one matches the document_class_id and/or
            dossier_class_id provided. Returns `[{id, kind, name, description}]`
            so the agent can pick which one(s) to fetch in full.

        - name: get_playbook
          method: GET
          path: /api/v1/playbooks/{{ kind }}/{{ name }}
          parameters:
            type: object
            properties:
              kind: { type: string, enum: [retrieval, synthesis] }
              name: { type: string }
            required: [kind, name]
          description: |
            Fetch a playbook's full content. Use after `list_applicable_playbooks`
            has surfaced what's available for the current scope.

        - name: get_dossier_classes
          method: GET
          path: /api/v1/config/dossier-classes
          description: List dossier classes (empty if dossiers not configured).

        - name: get_dossier_class_properties
          method: GET
          path: /api/v1/config/dossier-classes/{{ class_id }}/properties
          parameters:
            type: object
            properties:
              class_id: { type: string, format: uuid }
            required: [class_id]

        - name: find_candidate_dossiers
          method: GET
          path: /api/v1/dossiers
          parameters:
            type: object
            properties:
              dossier_class_id: { type: string, format: uuid }

        # ── content access ──
        - name: get_document
          method: GET
          path: /api/v1/documents/{{ doc_id }}
          parameters:
            type: object
            properties:
              doc_id: { type: string, format: uuid }
            required: [doc_id]

        - name: read_document_content
          method: GET
          path: /api/v1/documents/{{ doc_id }}/versions/{{ version }}/content
          requestBodyMapping: query
          parameters:
            type: object
            properties:
              doc_id: { type: string, format: uuid }
              version: { type: integer }
              line_from: { type: integer, minimum: 1 }
              line_to: { type: integer, minimum: 1 }
            required: [doc_id, version]
          description: |
            Read document content. Returns at most ~500 lines per call to
            keep tool responses small. The response includes `total_lines`,
            `line_from`, `line_to`, and `next_line` — if `next_line` is
            non-null, call again with `line_from=<next_line>` to continue
            reading.

        - name: get_property_values
          method: GET
          path: /api/v1/documents/{{ doc_id }}/property-values
          parameters:
            type: object
            properties:
              doc_id: { type: string, format: uuid }
            required: [doc_id]

        - name: list_dossier_documents
          method: GET
          path: /api/v1/dossiers/{{ dossier_id }}/documents
          parameters:
            type: object
            properties:
              dossier_id: { type: string, format: uuid }
            required: [dossier_id]

        # ── ingestion writes ──
        - name: set_document_class
          method: POST
          path: /api/v1/ingest/documents/{{ doc_id }}/class
          parameters:
            type: object
            properties:
              doc_id: { type: string, format: uuid }
              document_class_id: { type: string, format: uuid }
              confidence: { type: number }
              reason: { type: string }
            required: [doc_id, document_class_id]

        - name: set_document_summary
          method: POST
          path: /api/v1/ingest/documents/{{ doc_id }}/summary
          parameters:
            type: object
            properties:
              doc_id: { type: string, format: uuid }
              summary: { type: string }
              toc: { type: object }
            required: [doc_id, summary]

        - name: set_property_value
          method: POST
          path: /api/v1/ingest/property-values
          parameters:
            type: object
            properties:
              property_id: { type: string, format: uuid }
              document_id: { type: string, format: uuid }
              document_version_id: { type: string, format: uuid }
              value: {}
              source_span: { type: object }
              method: { type: string, enum: [auto, manual] }
              confidence: { type: number }
              reason: { type: string }
            required: [property_id, document_id, value]

        - name: propose_new_entity
          method: POST
          path: /api/v1/ingest/entities
          parameters:
            type: object
            properties:
              entity_type_id: { type: string, format: uuid }
              canonical_form: { type: string }
              extra_metadata: { type: object }
              # Evidence — required when the EntityType is `closed` so the
              # mention can be parked as an unresolved mention; useful for
              # `review` mode to give reviewers context.
              document_id: { type: string, format: uuid }
              document_version_id: { type: string, format: uuid }
              span: { type: object }
              confidence: { type: number }
              proposing_agent: { type: string }
              reasoning: { type: string }
            required: [entity_type_id, canonical_form]
          description: |
            Find-or-create. Tries alias/canonical match first; on no match,
            the EntityType's `creation_mode` decides what happens. The
            response is `{kind, id, canonical_form, creation_mode}`:
              - kind="entity"     → matched or open-mode insert. Use this id
                                    with `record_entity_mention`.
              - kind="proposal"   → review-mode: held for approval. DO NOT
                                    call `record_entity_mention` (the id is a
                                    proposal id, not an entity id).
              - kind="unresolved" → closed-mode: mention has been parked. DO
                                    NOT call `record_entity_mention`.
              - kind="blocked"    → closed-mode without evidence. Always pass
                                    document_id + span so this never happens.

        - name: record_entity_mention
          method: POST
          path: /api/v1/ingest/entity-mentions
          parameters:
            type: object
            properties:
              document_id: { type: string, format: uuid }
              document_version_id: { type: string, format: uuid }
              entity_id: { type: string, format: uuid }
              span: { type: object }
              confidence: { type: number }
            required: [document_id, entity_id, span]

        - name: find_entity_by_name
          method: POST
          path: /api/v1/ingest/find-entity
          parameters:
            type: object
            properties:
              name: { type: string }
              document_id: { type: string, format: uuid }
            required: [name, document_id]
          description: |
            Resolve an entity name to entity IDs among the entities already
            mentioned in this document. Returns a list of
            {entity_id, canonical_form, mention_id, confidence}. Use the
            entity_id as source_id / target_id for record_relationship.
            Matching is partial and case-insensitive, so a short query like
            "Commission" works; pick the right match from the returned list.

        - name: record_relationship
          method: POST
          path: /api/v1/ingest/relationships
          parameters:
            type: object
            properties:
              relationship_definition_id: { type: string, format: uuid }
              source_id: { type: string, format: uuid }
              target_id: { type: string, format: uuid }
              current_state_id: { type: string, format: uuid }
              evidence_document_id: { type: string, format: uuid }
              evidence_span: { type: object }
              confidence: { type: number }
              notes: { type: string }
            required: [relationship_definition_id, source_id, target_id]

        - name: propose_relationship
          method: POST
          path: /api/v1/ingest/relationship-proposals
          parameters:
            type: object
            properties:
              relationship_definition_id: { type: string, format: uuid }
              source_id: { type: string, format: uuid }
              target_id: { type: string, format: uuid }
              suggested_state_id: { type: string, format: uuid }
              proposing_agent: { type: string }
              reasoning: { type: string }
              evidence_document_id: { type: string, format: uuid }
              evidence_span: { type: object }
              confidence: { type: number }
            required: [relationship_definition_id, source_id, target_id]

        - name: record_unresolved_relationship
          method: POST
          path: /api/v1/ingest/unresolved-relationships
          parameters:
            type: object
            properties:
              relationship_definition_id: { type: string, format: uuid }
              source_id: { type: string, format: uuid }
              target_key: { type: string }
              target_key_kind: { type: string }
              suggested_state_id: { type: string, format: uuid }
              proposing_agent: { type: string }
              reasoning: { type: string }
              evidence_document_id: { type: string, format: uuid }
              evidence_span: { type: object }
              confidence: { type: number }
            required: [relationship_definition_id, source_id, target_key]
          description: |
            Record a relationship whose source node is known but whose target
            isn't in the graph yet — e.g. the document cites an ECLI we haven't
            ingested. Pass the raw reference as `target_key` (and `target_key_kind`,
            e.g. "ecli"). The edge is held until a resolver promotes it to a real
            relationship when the target is later ingested. Prefer this over
            dropping a cite you can't resolve.

        - name: assign_dossier
          method: POST
          path: /api/v1/dossiers/{{ dossier_id }}/documents
          parameters:
            type: object
            properties:
              dossier_id: { type: string, format: uuid }
              document_id: { type: string, format: uuid }
              role: { type: string }
            required: [dossier_id, document_id]

        - name: propose_new_dossier
          method: POST
          path: /api/v1/dossiers
          parameters:
            type: object
            properties:
              dossier_class_id: { type: string, format: uuid }
              name: { type: string }
              status: { type: string }
            required: [dossier_class_id, name]

        # ── retrieval ──
        - name: introspect
          method: POST
          path: /api/v1/retrieval/introspect
          parameters:
            type: object
            properties:
              filter: { type: object }
              fields:
                type: array
                items: { type: string }
              top_k: { type: integer }

        - name: matching_documents
          method: POST
          path: /api/v1/retrieval/matching-documents
          parameters:
            type: object
            properties:
              filter: { type: object }
              limit: { type: integer, default: 50 }
          description: |
            Enumerate the document ids matching the filter — the companion to
            `introspect`, which only returns counts and value distributions.
            Same filter body as introspect. Returns {document_ids: [...]},
            capped by `limit` (default 50, max 200). Use it to pull the actual
            matches into a draft Result via `add_files_to_result`.

        - name: create_draft_result
          method: POST
          path: /api/v1/retrieval/results
          parameters:
            type: object
            properties:
              query: { type: string }
              invoked_skill_names:
                type: array
                items: { type: string }
              parent_result_id: { type: string, format: uuid }
            required: [query]

        - name: add_files_to_result
          method: POST
          path: /api/v1/retrieval/results/{{ result_id }}/files
          parameters:
            type: object
            properties:
              result_id: { type: string, format: uuid }
              document_ids:
                type: array
                items: { type: string, format: uuid }
              reason: { type: string }
              added_by_agent: { type: string }
            required: [result_id, document_ids]
          description: Add documents to the draft result. Pair with a reason; the agent's prior `append_trace` or its own narrative is the audit trail.

        - name: remove_files_from_result
          method: POST
          path: /api/v1/retrieval/results/{{ result_id }}/files/remove
          parameters:
            type: object
            properties:
              result_id: { type: string, format: uuid }
              document_ids:
                type: array
                items: { type: string, format: uuid }
              reason: { type: string }
            required: [result_id, document_ids]
          description: Remove specific documents from the draft result. Server auto-traces.

        - name: clear_result_files
          method: POST
          path: /api/v1/retrieval/results/{{ result_id }}/files/clear
          parameters:
            type: object
            properties:
              result_id: { type: string, format: uuid }
            required: [result_id]
          description: Drop all documents from the draft result. Rare — used when restarting the selection.

        # ── filter mutations on the draft Result ──
        # All filter ops carry filter_version (optimistic concurrency); the
        # server auto-writes a result_trace row with before/after state and
        # candidate-count delta. The agent does NOT need to call append_trace
        # for these mutations — only for narrative entries (reasoning).

        - name: introspect_by_result
          method: POST
          path: /api/v1/retrieval/results/{{ result_id }}/introspect
          parameters:
            type: object
            properties:
              result_id: { type: string, format: uuid }
              fields:
                type: array
                items: { type: string }
              top_k: { type: integer, default: 25 }
              overlay:
                type: object
                description: Optional ephemeral filter overlay for what-if probes; not persisted.
            required: [result_id]
          description: Run introspect against the persisted filter on this result. Preferred over the stateless `/introspect` once a draft Result exists — the filter is not re-emitted on the wire.

        - name: set_document_class_filter
          method: POST
          path: /api/v1/retrieval/results/{{ result_id }}/filter/document-class/set
          parameters:
            type: object
            properties:
              result_id: { type: string, format: uuid }
              filter_version: { type: integer }
              document_class_id: { type: string, format: uuid }
            required: [result_id, filter_version, document_class_id]
          description: Scope this result to one DocumentClass.

        - name: clear_document_class_filter
          method: POST
          path: /api/v1/retrieval/results/{{ result_id }}/filter/document-class/clear
          parameters:
            type: object
            properties:
              result_id: { type: string, format: uuid }
              filter_version: { type: integer }
            required: [result_id, filter_version]
          description: Remove the document-class scope.

        - name: set_dossier_filter
          method: POST
          path: /api/v1/retrieval/results/{{ result_id }}/filter/dossier/set
          parameters:
            type: object
            properties:
              result_id: { type: string, format: uuid }
              filter_version: { type: integer }
              dossier_id: { type: string, format: uuid }
            required: [result_id, filter_version, dossier_id]
          description: Scope this result to one specific Dossier.

        - name: set_dossier_class_filter
          method: POST
          path: /api/v1/retrieval/results/{{ result_id }}/filter/dossier-class/set
          parameters:
            type: object
            properties:
              result_id: { type: string, format: uuid }
              filter_version: { type: integer }
              dossier_class_id: { type: string, format: uuid }
            required: [result_id, filter_version, dossier_class_id]
          description: Scope this result to docs inside dossiers of this class.

        - name: clear_dossier_filters
          method: POST
          path: /api/v1/retrieval/results/{{ result_id }}/filter/dossier/clear
          parameters:
            type: object
            properties:
              result_id: { type: string, format: uuid }
              filter_version: { type: integer }
            required: [result_id, filter_version]
          description: Clear both dossier_id and dossier_class_id.

        - name: set_field_filter
          method: POST
          path: /api/v1/retrieval/results/{{ result_id }}/filter/field-filters/{{ field }}/set
          parameters:
            type: object
            properties:
              result_id: { type: string, format: uuid }
              field: { type: string }
              filter_version: { type: integer }
              op:
                type: string
                enum: [eq, in, gte, lte, gt, lt, neq]
                default: in
              values:
                type: array
              value: {}
              join:
                type: string
                enum: [and, or]
                default: and
            required: [result_id, field, filter_version, op]
          description: Upsert a property field filter. Replaces any existing filter on the same field.

        - name: extend_field_filter_values
          method: POST
          path: /api/v1/retrieval/results/{{ result_id }}/filter/field-filters/{{ field }}/extend
          parameters:
            type: object
            properties:
              result_id: { type: string, format: uuid }
              field: { type: string }
              filter_version: { type: integer }
              values:
                type: array
            required: [result_id, field, filter_version, values]
          description: Append values to an existing field filter (op must be `in` or `neq`). Auto-creates with op=in if absent.

        - name: shrink_field_filter_values
          method: POST
          path: /api/v1/retrieval/results/{{ result_id }}/filter/field-filters/{{ field }}/shrink
          parameters:
            type: object
            properties:
              result_id: { type: string, format: uuid }
              field: { type: string }
              filter_version: { type: integer }
              values:
                type: array
            required: [result_id, field, filter_version, values]
          description: Remove specific values from a field filter. Drops the filter entirely if the values list becomes empty.

        - name: remove_field_filter
          method: POST
          path: /api/v1/retrieval/results/{{ result_id }}/filter/field-filters/{{ field }}/remove
          parameters:
            type: object
            properties:
              result_id: { type: string, format: uuid }
              field: { type: string }
              filter_version: { type: integer }
            required: [result_id, field, filter_version]
          description: Drop the field filter for this field.

        - name: set_regex_filter
          method: POST
          path: /api/v1/retrieval/results/{{ result_id }}/filter/regex-filters/{{ field }}/set
          parameters:
            type: object
            properties:
              result_id: { type: string, format: uuid }
              field: { type: string }
              filter_version: { type: integer }
              pattern: { type: string }
            required: [result_id, field, filter_version, pattern]
          description: Upsert a regex filter on a property field.

        - name: remove_regex_filter
          method: POST
          path: /api/v1/retrieval/results/{{ result_id }}/filter/regex-filters/{{ field }}/remove
          parameters:
            type: object
            properties:
              result_id: { type: string, format: uuid }
              field: { type: string }
              filter_version: { type: integer }
            required: [result_id, field, filter_version]
          description: Drop the regex filter for this field.

        - name: set_text_search
          method: POST
          path: /api/v1/retrieval/results/{{ result_id }}/filter/text-search/set
          parameters:
            type: object
            properties:
              result_id: { type: string, format: uuid }
              filter_version: { type: integer }
              query: { type: string }
            required: [result_id, filter_version, query]
          description: Set the full-text-search query on this filter.

        - name: clear_text_search
          method: POST
          path: /api/v1/retrieval/results/{{ result_id }}/filter/text-search/clear
          parameters:
            type: object
            properties:
              result_id: { type: string, format: uuid }
              filter_version: { type: integer }
            required: [result_id, filter_version]
          description: Clear the full-text-search query.

        - name: add_explicit_includes
          method: POST
          path: /api/v1/retrieval/results/{{ result_id }}/filter/includes/add
          parameters:
            type: object
            properties:
              result_id: { type: string, format: uuid }
              filter_version: { type: integer }
              document_ids:
                type: array
                items: { type: string, format: uuid }
            required: [result_id, filter_version, document_ids]
          description: Pin specific documents as forced-includes regardless of other filter clauses.

        - name: remove_explicit_includes
          method: POST
          path: /api/v1/retrieval/results/{{ result_id }}/filter/includes/remove
          parameters:
            type: object
            properties:
              result_id: { type: string, format: uuid }
              filter_version: { type: integer }
              document_ids:
                type: array
                items: { type: string, format: uuid }
            required: [result_id, filter_version, document_ids]
          description: Unpin specific documents from the explicit-includes list.

        - name: clear_explicit_includes
          method: POST
          path: /api/v1/retrieval/results/{{ result_id }}/filter/includes/clear
          parameters:
            type: object
            properties:
              result_id: { type: string, format: uuid }
              filter_version: { type: integer }
            required: [result_id, filter_version]
          description: Clear all explicit includes.

        - name: add_explicit_excludes
          method: POST
          path: /api/v1/retrieval/results/{{ result_id }}/filter/excludes/add
          parameters:
            type: object
            properties:
              result_id: { type: string, format: uuid }
              filter_version: { type: integer }
              document_ids:
                type: array
                items: { type: string, format: uuid }
            required: [result_id, filter_version, document_ids]
          description: Block specific documents from the candidate set.

        - name: remove_explicit_excludes
          method: POST
          path: /api/v1/retrieval/results/{{ result_id }}/filter/excludes/remove
          parameters:
            type: object
            properties:
              result_id: { type: string, format: uuid }
              filter_version: { type: integer }
              document_ids:
                type: array
                items: { type: string, format: uuid }
            required: [result_id, filter_version, document_ids]
          description: Unblock specific documents from the explicit-excludes list.

        - name: clear_explicit_excludes
          method: POST
          path: /api/v1/retrieval/results/{{ result_id }}/filter/excludes/clear
          parameters:
            type: object
            properties:
              result_id: { type: string, format: uuid }
              filter_version: { type: integer }
            required: [result_id, filter_version]
          description: Clear all explicit excludes.

        - name: clear_filter
          method: POST
          path: /api/v1/retrieval/results/{{ result_id }}/filter/clear
          parameters:
            type: object
            properties:
              result_id: { type: string, format: uuid }
              filter_version: { type: integer }
            required: [result_id, filter_version]
          description: Reset the entire filter on this result to empty defaults.

        - name: replace_filter
          method: POST
          path: /api/v1/retrieval/results/{{ result_id }}/filter/replace
          parameters:
            type: object
            properties:
              result_id: { type: string, format: uuid }
              filter_version: { type: integer }
              filter: { type: object }
            required: [result_id, filter_version, filter]
          description: Total override of the filter. Escape hatch — prefer specific mutations when possible.

        - name: append_trace
          method: POST
          path: /api/v1/retrieval/results/{{ result_id }}/trace
          parameters:
            type: object
            properties:
              result_id: { type: string, format: uuid }
              sequence: { type: integer }
              agent: { type: string }
              action: { type: string }
              parameters: { type: object }
              outcome: { type: object }
            required: [result_id, sequence, agent, action]

        - name: publish_result
          method: POST
          path: /api/v1/retrieval/results/{{ result_id }}/publish
          parameters:
            type: object
            properties:
              result_id: { type: string, format: uuid }
            required: [result_id]

        - name: get_result
          method: GET
          path: /api/v1/results/{{ result_id }}
          parameters:
            type: object
            properties:
              result_id: { type: string, format: uuid }
            required: [result_id]

        - name: get_result_documents
          method: GET
          path: /api/v1/results/{{ result_id }}/documents
          parameters:
            type: object
            properties:
              result_id: { type: string, format: uuid }
            required: [result_id]

        - name: get_relationships
          method: GET
          path: /api/v1/relationships
          parameters:
            type: object
            properties:
              relationship_definition_id: { type: string, format: uuid }
              source_id: { type: string, format: uuid }
              target_id: { type: string, format: uuid }

        - name: get_unresolved_relationships
          method: GET
          path: /api/v1/relationships/unresolved
          parameters:
            type: object
            properties:
              status_filter: { type: string }
              source_id: { type: string, format: uuid }
              target_key: { type: string }
          description: >
            List parked relationships whose target node isn't in the graph yet
            (e.g. cited ECLIs not yet ingested). Filter by status_filter
            (default "unresolved"), source_id, or target_key. The future
            resolver agent reads these to promote them once targets are ingested.

        # ── discovery (config auto-suggestion) ──
        - name: list_run_candidates
          method: GET
          path: /api/v1/discovery/runs/{{ run_id }}/candidates
          parameters:
            type: object
            properties:
              run_id: { type: string, format: uuid }
            required: [run_id]
          description: List raw discovery candidates for a run (used by the consolidator).

        - name: submit_discovery_candidate
          method: POST
          path: /api/v1/discovery/candidates
          parameters:
            type: object
            properties:
              run_id: { type: string, format: uuid }
              kind: { type: string }
              payload: { type: object }
              evidence_document_id: { type: string, format: uuid }
              evidence_span: { type: object }
              confidence: { type: number }
            required: [run_id, kind, payload]
          description: Submit a raw candidate config item discovered in a single document.

        - name: submit_consolidated_proposal
          method: POST
          path: /api/v1/discovery/proposals
          parameters:
            type: object
            properties:
              run_id: { type: string, format: uuid }
              kind: { type: string }
              payload: { type: object }
              supporting_candidate_ids:
                type: array
                items: { type: string, format: uuid }
            required: [run_id, kind, payload, supporting_candidate_ids]
          description: Submit a deduplicated proposal that folds multiple raw candidates.

        # ── synthesis ──
        - name: start_answer
          method: POST
          path: /api/v1/synthesis/answers
          parameters:
            type: object
            properties:
              question: { type: string }
              source_result_id: { type: string, format: uuid }
              source_dossier_id: { type: string, format: uuid }
            required: [question]

        - name: draft_claim
          method: POST
          path: /api/v1/synthesis/answers/{{ answer_id }}/claims
          parameters:
            type: object
            properties:
              answer_id: { type: string, format: uuid }
              sequence: { type: integer }
              claim_text: { type: string }
              claim_type: { type: string }
            required: [answer_id, sequence, claim_text]

        - name: bind_evidence
          method: POST
          path: /api/v1/synthesis/claims/{{ claim_id }}/evidence
          parameters:
            type: object
            properties:
              claim_id: { type: string, format: uuid }
              document_id: { type: string, format: uuid }
              document_version_id: { type: string, format: uuid }
              span: { type: object }
              stance: { type: string, enum: [supports, contradicts, qualifies] }
              relevance: { type: number }
            required: [claim_id, document_id, span]

        - name: record_validation_verdict
          method: POST
          path: /api/v1/synthesis/evidence/{{ evidence_id }}/verdict
          parameters:
            type: object
            properties:
              evidence_id: { type: string, format: uuid }
              validated: { type: boolean }
              reasoning: { type: string }
            required: [evidence_id, validated, reasoning]

        - name: publish_answer
          method: POST
          path: /api/v1/synthesis/answers/{{ answer_id }}/publish
          parameters:
            type: object
            properties:
              answer_id: { type: string, format: uuid }
            required: [answer_id]

        # ── answer reads (let the faithfulness validator enumerate evidence) ──
        - name: get_answer_claims
          method: GET
          path: /api/v1/answers/{{ answer_id }}/claims
          parameters:
            type: object
            properties:
              answer_id: { type: string, format: uuid }
            required: [answer_id]

        - name: get_claim_evidence
          method: GET
          path: /api/v1/answers/claims/{{ claim_id }}/evidence
          parameters:
            type: object
            properties:
              claim_id: { type: string, format: uuid }
            required: [claim_id]

  # ─────────────────────────────────────────────
  # Function — post-upload hook on grove/documents
  # ─────────────────────────────────────────────
  functions:
    - namespace: grove
      name: post_upload
      description: >
        Invoked by Sinas after a file is uploaded to the grove/documents
        collection. Registers the document with Grove and dispatches the
        ingestion_coordinator agent.
      sharedPool: true
      timeout: 120
      inputSchema:
        type: object
        properties:
          file_id: { type: string }
          namespace: { type: string }
          collection: { type: string }
          filename: { type: string }
          version: { type: integer }
          file_path: { type: string }
          user_id: { type: string }
          metadata: { type: object }
      code: |
        import base64
        import os
        import tempfile
        from pathlib import Path

        import requests
        from markitdown import MarkItDown

        SINAS_URL = os.environ.get("SINAS_URL", "http://host.docker.internal:8000")
        GROVE_URL = os.environ.get("GROVE_URL", "http://host.docker.internal:8080")

        def handler(input_data, context):
            token = context["access_token"]
            sinas_headers = {"Authorization": f"Bearer {token}"}
            namespace = input_data["namespace"]
            collection = input_data["collection"]
            filename = input_data["filename"]

            # 1. Pull the raw file from Sinas
            resp = requests.get(
                f"{SINAS_URL}/files/{namespace}/{collection}/{filename}",
                headers=sinas_headers,
                timeout=60,
            )
            resp.raise_for_status()
            payload = resp.json()
            raw = base64.b64decode(payload["content_base64"])

            # 2. Convert to markdown — MarkItDown handles docx, pdf, html,
            #    xlsx, pptx, csv, and many more. Falls back to None on any
            #    failure; Grove still registers the document, and a later
            #    extraction agent can retry.
            content_md = None
            extraction_error = None
            suffix = Path(filename).suffix or ""
            try:
                with tempfile.NamedTemporaryFile(suffix=suffix, delete=False) as tmp:
                    tmp.write(raw)
                    tmp_path = tmp.name
                try:
                    result = MarkItDown().convert(tmp_path)
                    content_md = result.text_content
                finally:
                    try:
                        os.unlink(tmp_path)
                    except OSError:
                        pass
            except Exception as exc:
                extraction_error = f"{type(exc).__name__}: {exc}"
                print(f"[grove/post_upload] markitdown failed for {filename}: {extraction_error}")
                content_md = None
            else:
                if not content_md:
                    print(
                        f"[grove/post_upload] markitdown produced empty content for {filename}"
                    )

            # 3. Register the document with Grove (idempotent on collection_file_id).
            # If the upload metadata carries `staged: true`, the document is
            # parked: Grove still indexes the text but the auto-pipeline
            # (classifier + extractors) doesn't fire. The user runs an
            # IngestionRun later to promote staged docs once their schema is
            # ready. Used by the discovery upload flow.
            upload_metadata = input_data.get("metadata") or {}
            staged = bool(upload_metadata.get("staged", False))
            grove_headers = {
                "Authorization": f"Bearer {token}",
                "Content-Type": "application/json",
            }
            register = requests.post(
                f"{GROVE_URL}/api/v1/ingest/post-upload",
                json={
                    "collection_file_id": input_data["file_id"],
                    "filename": filename,
                    "content_md": content_md,
                    "metadata": upload_metadata,
                    "staged": staged,
                },
                headers=grove_headers,
                timeout=60,
            )
            register.raise_for_status()
            registered = register.json()

            if staged:
                # Skip the coordinator — the doc is parked for discovery.
                return {
                    "registered": True,
                    "staged": True,
                    "document_id": registered["document_id"],
                    "document_version_id": registered["document_version_id"],
                    "extracted_chars": len(content_md) if content_md else 0,
                    "extraction_error": extraction_error,
                    "agent_chat_id": None,
                    "agent_reply": "skipped — staged document",
                }

            # 4. Hand off to the ingestion_coordinator agent via Sinas's
            #    synchronous /agents/{ns}/{name}/invoke endpoint. The
            #    coordinator will fan out to the enrichment agents in
            #    parallel; we wait for it to finish so any failure surfaces
            #    here instead of disappearing silently.
            invoke_body = {
                "message": (
                    f"Ingest document {registered['document_id']} "
                    f"(version {registered['version']}). "
                    f"Filename: {filename}. "
                    "Run the full ingestion pipeline."
                ),
                "input": {
                    "document_id": registered["document_id"],
                    "document_version_id": registered["document_version_id"],
                    "version": registered["version"],
                    "upload_metadata": upload_metadata,
                },
            }
            invoke = requests.post(
                f"{SINAS_URL}/agents/grove/ingestion-coordinator/invoke",
                json=invoke_body,
                headers=sinas_headers,
                timeout=600,  # ingestion fan-out can take a while
            )
            invoke.raise_for_status()
            invoke_result = invoke.json()
            return {
                "registered": True,
                "staged": False,
                "document_id": registered["document_id"],
                "document_version_id": registered["document_version_id"],
                "extracted_chars": len(content_md) if content_md else 0,
                "extraction_error": extraction_error,
                "agent_chat_id": invoke_result.get("chat_id"),
                "agent_reply": invoke_result.get("reply"),
            }

  # Playbooks are Grove-owned (since v0.1.13). They are no longer Sinas
  # skills; the agents fetch them at runtime via `list_applicable_playbooks`
  # and `get_playbook` connector ops below. Deployments author playbooks in
  # the Grove admin UI or via a GrovePackage YAML.

  # ─────────────────────────────────────────────
  # Agents
  # ─────────────────────────────────────────────
  agents:
    # ───────── ingestion ─────────
    - namespace: grove
      name: ingestion-coordinator
      description: Orchestrates ingestion for a single document.
      llmProviderName: ${{ vars.PRIMARY_LLM }}
      temperature: 0.1
      systemPrompt: |
        You orchestrate Grove's document ingestion pipeline. You receive a
        document_id (and version) for a freshly uploaded file. Your job is
        to produce a fully indexed, queryable document.

        Workflow:
          1. Invoke the `classifier-agent` with the document_id. Wait for it
             to assign a document_class.
          2. In parallel, invoke:
               - `summarizer-agent`
               - `property-extractor-agent`
               - `entity-extractor-agent`
               - `relationship-extractor-agent`
               - `dossier-assigner-agent` (only if `get_dossier_classes`
                 returns non-empty)
          3. If any enrichment agent fails, the document still becomes
             queryable with that dimension missing. Log the failure in
             your reply but do not block the others.
          4. Reply with a summary of what was indexed.

        Tools:
          - grove/api: get_document_classes, get_dossier_classes (for the
            dossier-or-not check)
          - sub-agents listed above

        Do not write to the document directly — that's the enrichment
        agents' job.
      enabledConnectors:
        - connector: grove/api
          operations: [get_document_classes, get_dossier_classes, get_document]
      enabledAgents:
        - grove/classifier-agent
        - grove/summarizer-agent
        - grove/property-extractor-agent
        - grove/entity-extractor-agent
        - grove/relationship-extractor-agent
        - grove/dossier-assigner-agent

    - namespace: grove
      name: classifier-agent
      description: Assigns a document_class_id; can propose a new class.
      llmProviderName: ${{ vars.CHEAP_LLM }}
      temperature: 0.0
      systemPrompt: |
        You classify a single document into one of the document classes
        configured for this Grove deployment.

        Workflow:
          1. Call `get_document_classes` to see the available classes. Read
             each class's description and `classification_hints` carefully —
             this is where the admin tells you how to disambiguate.
          2. Call `read_document_content` to read the first ~200 lines of
             the document. Read more if classification is ambiguous.
          3. Pick the best matching class. Call `set_document_class` with
             your choice, a confidence score (0-1), and a one-line reason.
          4. If no class is clearly appropriate, do NOT force a match —
             explain in your reply and stop. (A future version will let you
             propose a new class via `propose_new_document_class`.)

        Domain knowledge lives in the class descriptions and hints. Do not
        rely on prior assumptions about what kinds of documents exist.
      enabledConnectors:
        - connector: grove/api
          operations:
            - get_document_classes
            - get_document
            - read_document_content
            - set_document_class

    - namespace: grove
      name: summarizer-agent
      description: Produces document.summary and document.toc.
      llmProviderName: ${{ vars.CHEAP_LLM }}
      temperature: 0.0
      systemPrompt: |
        You write a concise summary and table of contents for a document.

        Workflow:
          1. Call `get_document` to see the assigned document class.
          2. Call `get_document_classes` and find the class. Read its
             `summarization_guidance` — this tells you what the summary
             must emphasize for this class.
          3. Call `read_document_content` to read the document.
          4. Call `set_document_summary` with:
               - `summary`: ~150 words, following the guidance
               - `toc`: nested object reflecting the document structure

        Be faithful. Do not invent details. If the document is too short
        for a meaningful TOC, return `toc: {}`.
      enabledConnectors:
        - connector: grove/api
          operations:
            - get_document
            - get_document_classes
            - read_document_content
            - set_document_summary

    - namespace: grove
      name: property-extractor-agent
      description: Populates property_values for the document's class.
      llmProviderName: ${{ vars.CHEAP_LLM }}
      temperature: 0.0
      systemPrompt: |
        You extract structured properties from a document.

        Workflow:
          1. Call `get_document` to find the document_class_id.
          2. Call `get_document_class_properties` to get the property
             schemas, descriptions, and `guidance` for each.
          3. For each property where `manual` is false:
              a. Read the relevant document content via
                 `read_document_content`. The property's `guidance` tells
                 you where in the document to look.
              b. Extract the value (matching the property's JSON schema).
              c. Call `set_property_value` with:
                  - the value
                  - `source_span` indicating where you found it
                  - `confidence` (0-1)
                  - a short `reason`
          4. If a required property cannot be found, set
             `confidence: 0` and explain in `reason`.

        Use the guidance literally. The admin authored it for this class
        specifically; do not generalize.
      enabledConnectors:
        - connector: grove/api
          operations:
            - get_document
            - get_document_class_properties
            - read_document_content
            - set_property_value

    - namespace: grove
      name: entity-extractor-agent
      description: Records entity mentions; proposes new canonical entities.
      llmProviderName: ${{ vars.CHEAP_LLM }}
      temperature: 0.0
      systemPrompt: |
        You extract entity mentions from a document.

        Workflow:
          1. Call `get_document` to find the document_class_id.
          2. Call `get_entity_types_for_class` to see which entity types
             apply. Read each type's `guidance`.
          3. Call `read_document_content`.
          4. For each mention you find:
              a. Call `propose_new_entity` with the canonical_form AND the
                 evidence (`document_id`, `span`, `confidence`, and a short
                 `reasoning`). This is find-or-create — the server matches
                 against existing aliases first.
              b. Inspect the returned `kind`:
                  - "entity"     → call `record_entity_mention` with the
                                   returned id.
                  - "proposal"   → STOP for this mention. The entity is
                                   pending human approval; the mention will
                                   be recorded when it's approved.
                  - "unresolved" → STOP for this mention. The EntityType is
                                   locked and the server has parked your
                                   mention for human review.
                  - "blocked"    → bug: you forgot to pass evidence. Fix
                                   your call.

        ALWAYS pass `document_id` and `span` to `propose_new_entity` so that
        locked-mode mentions can be parked. Without them the server returns
        "blocked" and the mention is lost.

        Be conservative. False mentions are worse than missed mentions —
        downstream agents will rediscover important entities.
      enabledConnectors:
        - connector: grove/api
          operations:
            - get_document
            - get_entity_types_for_class
            - read_document_content
            - propose_new_entity
            - record_entity_mention

    - namespace: grove
      name: relationship-extractor-agent
      description: Records relationships explicitly stated in the document.
      llmProviderName: ${{ vars.CHEAP_LLM }}
      temperature: 0.0
      systemPrompt: |
        You extract relationships explicitly stated in a document.

        Workflow:
          1. Call `get_document` and `get_relationship_definitions`. For
             each definition, read its `extraction_guidance`.
          2. For each definition where this document type can be a source
             or target (per source_ref_type / target_ref_type):
              a. SKIP definitions whose `creation_mode == "closed"` — the
                 graph is curated and the server will refuse your call
                 with HTTP 409.
              b. Read the document via `read_document_content`.
              c. For each relationship instance you find:
                  - resolve each end's name to an entity id with
                    `find_entity_by_name(name, document_id)`. record_relationship
                    takes entity IDs, not names; pick the right match from the
                    returned list (matching is partial and case-insensitive).
                  - if BOTH ends resolve to known nodes in the graph:
                      • confidence ≥ 0.8: call `record_relationship`. The
                        response is `{kind, id, creation_mode}`. If the
                        definition is in "review" mode, the server will
                        return `kind="proposal"` — that's expected; the
                        edge is queued for human approval.
                      • confidence < 0.8: call `propose_relationship`
                        (queues for human review)
                  - if the target is named but you cannot resolve it to a
                    node in the graph (e.g. the document cites an ECLI we
                    haven't ingested): call `record_unresolved_relationship`
                    with the raw reference as `target_key` and its kind as
                    `target_key_kind` (e.g. "ecli"). A resolver promotes it
                    to a real relationship when the target is later ingested.
                    Do NOT drop the cite — record it as unresolved.
              d. Always include `evidence_document_id` and
                 `evidence_span`.

        Only extract relationships explicitly stated in the document.
        Discovery — inferring relationships from broader research — is
        the relationship_discovery_agent's job, not yours.
      enabledConnectors:
        - connector: grove/api
          operations:
            - get_document
            - get_relationship_definitions
            - read_document_content
            - find_entity_by_name
            - record_relationship
            - propose_relationship
            - record_unresolved_relationship

    - namespace: grove
      name: dossier-assigner-agent
      description: Assigns documents to dossiers (only when dossiers configured).
      llmProviderName: ${{ vars.CHEAP_LLM }}
      temperature: 0.0
      systemPrompt: |
        You assign a document to one or more dossiers, or propose a new
        dossier when warranted.

        Workflow:
          1. Call `get_dossier_classes`. If empty, do nothing — this
             deployment has no dossiers configured.
          2. Call `get_document` and `get_property_values` to see what's
             already known about this document.
          3. For each dossier class that could plausibly contain this
             document:
              a. Call `find_candidate_dossiers` with that class id.
              b. Match against the candidates using the document's
                 properties (matter id, parties, transaction reference,
                 etc.) and the class's `classification_hints`.
              c. If a clear match: call `assign_dossier` with a `role`
                 (e.g. "primary_contract", "amendment", "correspondence").
              d. If no match but the document strongly anchors a new
                 dossier of this class: call `propose_new_dossier`.
              e. Otherwise: skip.

        Some documents are deployment-wide (policy memos, templates) and
        belong to no dossier. That's a valid outcome — do not force a
        match.
      enabledConnectors:
        - connector: grove/api
          operations:
            - get_dossier_classes
            - get_dossier_class_properties
            - get_document
            - get_property_values
            - find_candidate_dossiers
            - assign_dossier
            - propose_new_dossier

    # ───────── retrieval ─────────
    - namespace: grove
      name: search-orchestrator
      description: Decomposes queries; runs deep_search, merges results.
      llmProviderName: ${{ vars.PRIMARY_LLM }}
      temperature: 0.2
      systemPrompt: |
        You orchestrate retrieval for a user query.

        Workflow:
          1. Decide whether the query needs decomposition. Comparative
             questions ("how does X differ between A and B") and questions
             with multiple independent sub-questions usually do.
          2. For each (sub)query, invoke `deep-search-agent`. Each
             invocation runs the introspect-filter-validate loop and
             produces a draft result.
          3. After all sub-searches complete, merge their results into a
             single parent result. Persist the parent's
             `parent_result_id` linkage.
          4. Append a final trace entry summarizing the orchestration.
          5. Call `publish_result` on the parent.

        Single-shot queries don't need decomposition — invoke
        `deep-search-agent` once and publish its result directly.
      enabledConnectors:
        - connector: grove/api
          operations:
            - create_draft_result
            - add_files_to_result
            - append_trace
            - publish_result
            - get_result
      enabledAgents:
        - grove/deep-search-agent

    - namespace: grove
      name: deep-search-agent
      description: Runs the introspect-filter-check loop; produces a draft result.
      llmProviderName: ${{ vars.PRIMARY_LLM }}
      temperature: 0.2
      systemPrompt: |
        You retrieve documents for a query by iteratively narrowing
        candidates. You do NOT rely on semantic similarity alone — you
        introspect property-value distributions and apply structured
        filters.

        The filter is **persisted on the draft Result**. You do not pass
        a filter object around; you mutate it via dedicated ops and the
        server keeps the state. Every mutation auto-writes a trace row —
        you do NOT need to `append_trace` for filter mutations. Use
        `append_trace` only for narrative entries (your reasoning,
        intent, why you chose this branch).

        Loop:
          1. Call `create_draft_result` with the query. You receive
             `result_id` and `filter_version=0`.
          2. Call `introspect_by_result(result_id)`. Read the
             distributions: which fields have small, discriminating
             value sets? Which values match the query's intent?
             Each field's distribution is faceted — it reflects all
             your OTHER filters but not that field's own filter. So if
             you've narrowed `sector_targeted=Pharmaceutical`, the
             `sector_targeted` distribution still shows all sectors in
             the otherwise-narrowed set. Use this to see what you
             could pivot or widen to. The `total_documents` on each
             distribution is the count if you removed that one filter;
             the top-level `candidate_count` is the count with all
             filters applied — that's the number that should go down
             when a filter is doing work.
          3. Mutate the filter using one of:
               - `set_document_class_filter` to scope to a class
               - `set_field_filter` / `extend_field_filter_values` /
                 `shrink_field_filter_values` / `remove_field_filter`
                 for property filters
               - `set_text_search` / `clear_text_search` for FTS
               - `add_explicit_includes` / `add_explicit_excludes` for
                 pin/block
               - `clear_filter` / `replace_filter` for resets
             Pass the `filter_version` you last received. The response
             gives you a new `filter_version`, the new full `filter`,
             and the new `candidate_count`. The server traces the change.
          4. Optionally append a narrative `append_trace` explaining WHY
             you made the mutation (your reasoning, what you expected).
          5. Repeat 2–4 until either the candidate set matches your
             playbook's stop conditions, or introspect shows no further
             filter discriminates the set meaningfully.
          6. After narrowing the candidates with introspect, call
             `matching_documents` to get the actual document IDs.
             Introspect only returns counts and distributions, so this
             is the only way to learn WHICH documents the filter selected.
          7. Call `add_files_to_result` with those document IDs to include
             them in the Result (also pull any you staged via
             explicit_includes — `get_result_documents` shows what's
             already attached).
          8. Invoke `process-validation-agent` to check the draft
             against the playbook criteria. If it passes, return. If
             not, mutate the filter and retry.
          9. Optionally call `relationship-discovery-agent` to surface
             additional relationships that might inform the user (the
             discovery agent only writes proposals, never facts).

        Never publish a Result without first retrieving the document IDs
        via `matching_documents` and adding them with `add_files_to_result`
        — a Result with a filter but no attached documents is empty.

        Probe before commit: if you want to know "what would happen if I
        added jurisdiction=FR?" without committing the change, pass an
        `overlay` to `introspect_by_result` — it's read-only and not
        persisted.

        Before starting the loop: call `list_applicable_playbooks(kind=retrieval,
        document_class_id=…, dossier_class_id=…)` to see which retrieval
        playbooks apply, then `get_playbook` to fetch the bodies of any that
        look relevant. The playbook tells you the stop conditions and
        validation criteria for this kind of question.

        Domain knowledge is in playbooks — never hardcode strategy.
      enabledConnectors:
        - connector: grove/api
          operations:
            # introspect + result lifecycle
            - introspect
            - introspect_by_result
            - matching_documents
            - get_document
            - get_property_values
            - read_document_content
            - get_relationships
            - create_draft_result
            - add_files_to_result
            - remove_files_from_result
            - clear_result_files
            - append_trace
            - publish_result
            - get_result
            - get_result_documents
            # filter mutations (server-traced)
            - set_document_class_filter
            - clear_document_class_filter
            - set_dossier_filter
            - set_dossier_class_filter
            - clear_dossier_filters
            - set_field_filter
            - extend_field_filter_values
            - shrink_field_filter_values
            - remove_field_filter
            - set_regex_filter
            - remove_regex_filter
            - set_text_search
            - clear_text_search
            - add_explicit_includes
            - remove_explicit_includes
            - clear_explicit_includes
            - add_explicit_excludes
            - remove_explicit_excludes
            - clear_explicit_excludes
            - clear_filter
            - replace_filter
            # playbooks (Grove-owned)
            - list_applicable_playbooks
            - get_playbook
      enabledAgents:
        - grove/process-validation-agent
        - grove/relationship-discovery-agent
        - grove/deep-search-agent  # recursion for nested narrowing

    - namespace: grove
      name: process-validation-agent
      description: Checks a draft result against playbook criteria.
      llmProviderName: ${{ vars.CHEAP_LLM }}
      temperature: 0.0
      systemPrompt: |
        You validate a draft result against a retrieval playbook's
        sufficiency criteria.

        Workflow:
          1. Receive a result_id and the playbook name(s) the search
             agent loaded.
          2. Fetch the same playbook(s) via `get_playbook(kind=retrieval,
             name=…)`. Read the validation checklist.
          3. Call `get_result` and `get_result_documents` to inspect the
             draft.
          4. For each item on the playbook's checklist, judge: pass /
             fail / cannot-determine. Be strict — false passes are worse
             than false fails.
          5. Reply with a verdict (`pass`, `fail`, `inconclusive`) and a
             short reasoning per checklist item.

        Do not modify the result yourself — your only output is the
        verdict.
      enabledConnectors:
        - connector: grove/api
          operations:
            - get_result
            - get_result_documents
            - get_document
            - get_property_values
            - read_document_content
            - get_playbook

    - namespace: grove
      name: relationship-discovery-agent
      description: Proposes new relationships based on research context.
      llmProviderName: ${{ vars.PRIMARY_LLM }}
      temperature: 0.3
      systemPrompt: |
        You propose new relationships between documents/entities based on
        the research context of an active search.

        Workflow:
          1. Read the current result documents and existing relationships.
          2. Call `get_relationship_definitions`. For each, read its
             `discovery_guidance`.
          3. For each definition, look for relationships not yet recorded
             but supported by evidence in the result.
          4. Call `propose_relationship` for each finding. ALWAYS include
             `evidence_document_id`, `evidence_span`, and `reasoning`.
             Set `proposing_agent: "relationship_discovery"`.

        You write to `relationship_proposal` only — NEVER call
        `record_relationship`. Proposed relationships go through human
        review or auto-approval based on the deployment's confidence
        threshold.
      enabledConnectors:
        - connector: grove/api
          operations:
            - get_relationship_definitions
            - get_result
            - get_result_documents
            - get_document
            - get_property_values
            - read_document_content
            - get_relationships
            - propose_relationship

    # ───────── synthesis ─────────
    - namespace: grove
      name: synthesis-agent
      description: Drafts an answer with claim-bound evidence.
      llmProviderName: ${{ vars.PRIMARY_LLM }}
      temperature: 0.3
      systemPrompt: |
        You synthesize an answer to a question using evidence from a
        published result (or, optionally, a dossier).

        Workflow:
          1. Receive: a question, plus either source_result_id or
             source_dossier_id.
          2. Call `start_answer` with the question and source.
          3. Call `list_applicable_playbooks(kind=synthesis, …)` to see
             which synthesis playbooks are in scope, then `get_playbook`
             on the one whose `question patterns` match this question.
          4. Read broadly across the source's documents, not just the
             top few. Cover the full breadth of the result set, both
             the Concurrences commentary (secondary) and the primary
             decisions they cite:
               - result-driven: `get_result_documents`, then
                 `get_document_summary` for every document, and
                 `read_document_content` on each one you draw a claim
                 from
               - dossier-driven: `list_dossier_documents`, then read
                 each
          5. Draft a comprehensive set of claims, one by one. Target
             15-20 claims for a substantive question (more if the
             material supports it; fewer only if the result set is
             genuinely thin). Organize them by theme (market
             definition, competitive effects, precedent, remedies, …)
             and make each claim detailed and self-contained rather
             than a one-line summary. Draw claims from as many distinct
             documents as the question warrants, so the answer reflects
             the breadth of the corpus, not just a handful of sources.
               a. Call `draft_claim` with the next claim's text and
                  type. Capture the returned claim_id.
               b. For each piece of evidence supporting that claim,
                  call `bind_evidence` with the document_id, version,
                  and a precise span.
               c. Use `stance: "qualifies"` when the cited span limits
                  the claim, `"contradicts"` only when explicitly
                  presenting contrasting evidence.
          6. Invoke `faithfulness-validator-agent` on the answer.
          7. If the validator passes all evidence, call
             `publish_answer`. Otherwise, revise the offending claims
             or evidence and revalidate.

        Every load-bearing factual claim MUST have at least one
        evidence binding. Do not invent claims unsupported by spans
        in the source documents. A fuller answer must never come at
        the cost of unsupported claims: breadth comes from covering
        more evidence, not from asserting beyond it.
      enabledConnectors:
        - connector: grove/api
          operations:
            - start_answer
            - draft_claim
            - bind_evidence
            - publish_answer
            - get_result
            - get_result_documents
            - list_dossier_documents
            - get_document
            - read_document_content
            - list_applicable_playbooks
            - get_playbook
      enabledAgents:
        - grove/faithfulness-validator-agent

    # ───────── discovery (config auto-suggestion) ─────────
    - namespace: grove
      name: discovery-agent
      description: Per-document config suggester. One parameterized agent across all kinds (document_class, entity_type, relationship_definition, dossier_class, document_class_property).
      llmProviderName: ${{ vars.PRIMARY_LLM }}
      systemPrompt: |
        You suggest **new configuration items** based on what a single document
        contains.

        ## This run's context

        - run_id: {{ run_id }}
        - kind: {{ kind }}
        - mode: {{ mode }}
        - document_id: {{ document_id }}
        {%- if parent_class_id is defined %}
        - parent_class_id: {{ parent_class_id }}
        {%- endif %}

        Use these exact values verbatim when calling
        `submit_discovery_candidate` — `run_id` and `kind` are required and
        must match the values above.

        Your job is to read the document and emit candidate config items via
        `submit_discovery_candidate`. Each candidate is a *raw, per-document*
        finding — it's fine if the same thing appears across many docs; the
        consolidator agent will dedupe later.

        ## Reading the document

        `read_document_content` returns at most ~500 lines per call. The
        response includes `total_lines`, `line_from`, `line_to`, and
        `next_line`. If `next_line` is non-null, call again with
        `line_from=<next_line>` to continue. For a first pass, the front
        section of the document is usually enough to identify candidates;
        only continue reading if you genuinely need more context.

        ## Mode

        - **greenfield**: ignore existing config; propose anything that would
          help organize this corpus. Used when bootstrapping a new deployment.
        - **incremental**: read existing config first via the appropriate
          `get_*` operations. Only propose what isn't already covered. If a
          mention fits an existing entity_type or class, don't re-propose it.

        ## Per-kind expectations

        - **document_class** — propose only when this document doesn't fit any
          existing class well (incremental) or when you can identify a class
          worth having (greenfield). Payload shape:
          `{name, description, classification_hints}`.
        - **entity_type** — propose entity types that show up multiple times
          in this document and aren't covered by existing entity types.
          Payload: `{name, description, guidance, sample_aliases: [...]}`.
        - **relationship_definition** — propose if the document explicitly
          relates two things in a way the existing definitions don't cover.
          Payload:
          ```
          {
            name, description, cardinality, extraction_guidance,
            source_ref_type: "document_class" | "entity_type" | "dossier_class",
            source_ref_name: "<existing config row's name>",
            target_ref_type: ..., target_ref_name: ...
          }
          ```
          Use the EXACT name of an existing document_class / entity_type /
          dossier_class as you saw it in the config introspection ops. The
          approval step resolves names to ids. If you propose a relationship
          referring to something that doesn't yet exist as config, also
          propose that thing as its own candidate (separate kind).
        - **dossier_class** — only propose if dossiers are configured for
          this deployment AND the document signals a kind of container that
          isn't already a dossier class. Payload: `{name, description,
          classification_hints}`.
        - **document_class_property** — for the `parent_class_id` provided in
          your input, propose extractable fields you see in the document.
          Payload: `{document_class_id, name, description, schema, guidance,
          sample_value}`.

        ## How to operate

        1. In incremental mode: load existing config via the appropriate
           `get_*` connector op so you don't propose duplicates of what's
           already configured.
        2. Call `read_document_content` to read the document.
        3. For each candidate finding, call `submit_discovery_candidate` with:
            - `run_id` from your input
            - `kind` from your input
            - `payload` shaped per the kind
            - `evidence_document_id` = document_id
            - `evidence_span` = a small object describing where you found it
              (line numbers, section title, or a short quote)
            - `confidence` (0-1) — be conservative; the consolidator can
              tolerate misses but false positives become noise
        4. Return a brief reply summarizing how many candidates you submitted.

        ## What NOT to do

        - Do not invent things that aren't in the document.
        - Do not propose a class/type/property purely from the filename.
        - Do not call any agents.
        - Do not read or modify already-extracted data (property values,
          entity mentions). Discovery only inspects the document text.
      enabledConnectors:
        - connector: grove/api
          operations:
            - get_document
            - read_document_content
            - get_document_classes
            - get_document_class_properties
            - get_entity_types
            - get_entity_types_for_class
            - get_relationship_definitions
            - get_dossier_classes
            - submit_discovery_candidate

    - namespace: grove
      name: discovery-consolidator-agent
      description: Reads raw discovery candidates for a run, clusters semantic duplicates, and emits deduplicated config_proposal rows.
      llmProviderName: ${{ vars.PRIMARY_LLM }}
      systemPrompt: |
        You consolidate raw discovery candidates into deduplicated proposals.

        ## This run's context

        - run_id: {{ run_id }}
        - kind: {{ kind }}

        Use these exact values when calling `list_run_candidates` and
        `submit_consolidated_proposal`.

        ## Workflow

        1. Call `list_run_candidates` with the run_id to fetch all raw
           candidates for the run.
        2. Cluster them by semantic similarity:
            - Cluster `SalesContract`, `DealContract`, `Sales Agreement`,
              `Sales contract` together — same concept, different wording.
            - Don't merge things that are genuinely distinct just because
              their names rhyme. When in doubt, leave them separate; the
              admin can merge them in the review UI.
        3. For each cluster, pick the clearest **canonical** name and
           description. Combine descriptions and guidance from the cluster's
           candidates so the proposal is the strongest version of the idea.
        4. For each cluster, call `submit_consolidated_proposal` with:
            - `run_id` from your input
            - `kind` from your input
            - `payload` shaped per the kind, using the canonical fields
            - `supporting_candidate_ids` = every candidate id you folded
              into this cluster (the admin uses these to inspect evidence)
        5. Return a brief reply: how many candidates went in, how many
           proposals came out.

        ## Quality bar

        - Be willing to merge aggressively for obvious duplicates, but never
          merge two things that mean different operational outcomes (e.g.
          "purchase contract" and "lease contract" — different lifecycles).
        - Do not invent new candidates that weren't in the input list.
        - Confidence: take the average of the merged candidates' confidences,
          weighted by count. Include in the payload as `confidence_avg` if
          useful for the reviewer.

        ## Per-kind notes

        - For `relationship_definition`: source/target refs in candidate
          payloads are `{source_ref_type, source_ref_name}` and same for
          target. Keep that shape on the consolidated payload — the
          approval handler resolves names to ids automatically.
        - For `document_class_property`: the `document_class_id` in candidate
          payloads should always be the same within one run (it was passed
          as `parent_class_id`). Keep it on the consolidated payload.
      enabledConnectors:
        - connector: grove/api
          operations:
            - list_run_candidates
            - submit_consolidated_proposal

    - namespace: grove
      name: faithfulness-validator-agent
      description: Re-reads cited spans, verifies support, blocks bad publishes.
      llmProviderName: ${{ vars.PRIMARY_LLM }}
      temperature: 0.0
      systemPrompt: |
        You validate that every piece of evidence in an answer actually
        supports the claim it's bound to.

        Workflow:
          1. Receive an answer_id.
          2. Call `get_answer_claims(answer_id)` to list every claim, then
             `get_claim_evidence(claim_id)` per claim to list every evidence
             row. Each evidence row has an `id` and a `validated` flag.
          3. For each evidence row not already `validated: true`:
              a. Read the claim text and the cited span via
                 `read_document_content` (use the span's line_from/line_to).
              b. Judge whether the span supports the claim with the
                 declared stance.
              c. Call `record_validation_verdict` with the row's
                 `evidence_id`, `validated: true`/`false`, and a
                 one-sentence reasoning.
             Validate EVERY evidence row of EVERY claim. Enumerate them
             yourself; do not rely on ids passed in the invocation message.
          4. Reply with a per-claim summary. Be strict: if a span only
             tangentially relates to the claim, fail it.

        Your verdict gates publishing. Do not be lenient — better to
        send the synthesis_agent back for a revision than to publish a
        weak citation.
      enabledConnectors:
        - connector: grove/api
          operations:
            - get_answer_claims
            - get_claim_evidence
            - read_document_content
            - record_validation_verdict
